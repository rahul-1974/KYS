<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Know Your Skin | The Body Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0ede6;min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:430px;min-height:100vh;background:#FAF7F2;position:relative;overflow-x:hidden}
.header{padding:12px 20px;text-align:center;border-bottom:1px solid #e8e4de}
.header-label{font-size:10px;letter-spacing:0.25em;color:#C49B5C;font-weight:600;text-transform:uppercase}
.header-title{font-family:'Playfair Display',Georgia,serif;font-size:16px;color:#004D3D;margin-top:2px}
.screen{padding:24px 20px 32px;min-height:calc(100vh - 60px);display:none;animation:fadeUp .4s ease-out}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.step-label{font-size:11px;letter-spacing:0.15em;color:#C49B5C;font-weight:600;text-transform:uppercase;margin-bottom:8px}
h2{font-family:'Playfair Display',Georgia,serif;font-size:22px;color:#004D3D;font-weight:400;margin-bottom:16px}
.btn{display:inline-block;padding:12px 28px;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.02em;border:none;text-align:center}
.btn-primary{background:#004D3D;color:#fff}
.btn-primary:hover{background:#006B54}
.btn-outline{background:transparent;border:1.5px solid #004D3D;color:#004D3D}
.btn-outline:hover{background:#E8F5E9}
.btn-group{display:flex;gap:12px;justify-content:center;margin-top:24px}
.card{background:#fff;border-radius:14px;padding:16px;border:1px solid #e8e4de;margin-bottom:12px}
.bar-track{height:6px;border-radius:3px;background:#e8e4de;width:100%;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.progress-dots{display:flex;gap:4px;justify-content:center;margin-bottom:16px}
.progress-dots span{width:8px;height:4px;border-radius:2px;background:#d4d0c8;transition:all .3s}
.progress-dots span.active{width:24px;background:#004D3D}

/* Camera screen */
.camera-box{background:#2a2a28;border-radius:16px;height:360px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.camera-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);border-radius:16px}
.camera-box canvas{display:none}
.camera-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.camera-oval{width:200px;height:260px;border:2px solid rgba(255,255,255,.4);border-radius:50%;position:relative}
.camera-oval.ready{border-color:#4ade80}
.camera-status{position:absolute;bottom:16px;display:flex;gap:8px;align-items:center}
.camera-status .dot{width:8px;height:8px;border-radius:4px}
.camera-status span{font-family:'DM Sans',sans-serif;font-size:12px}
.camera-hint{font-family:'DM Sans',sans-serif;font-size:12px;color:#8a857c;text-align:center;margin-top:12px;line-height:1.6}

/* Analyzing */
.analyze-spinner{width:100px;height:100px;border-radius:50%;background:#E8F5E9;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
.analyze-spinner .ring{width:60px;height:60px;border-radius:30px;border:3px solid #004D3D;border-top-color:transparent;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.analyze-step{display:flex;align-items:center;gap:8px;font-size:12px;color:#ccc;padding:4px 0;transition:color .3s}
.analyze-step.done{color:#004D3D}

/* Results */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.metric-box{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e4de}
.metric-box .label{font-size:10px;color:#8a857c;text-transform:uppercase;letter-spacing:.08em}
.metric-box .value{font-family:'Playfair Display',serif;font-size:28px;line-height:1.2;margin-top:2px}
.metric-box .note{font-size:11px;margin-top:2px;font-weight:500}
.concern-row{background:#fff;border-radius:12px;padding:12px 16px;border:1px solid #e8e4de;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.concern-row .info{flex:1}
.concern-row .name{font-size:14px;font-weight:600;color:#2a2a28}
.concern-row .severity{font-size:12px;color:#8a857c}
.concern-row .bar-wrap{width:60px}

/* Environment */
.env-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.env-card{background:#fff;border-radius:12px;padding:14px 10px;border:1px solid #e8e4de;text-align:center}
.env-card .label{font-size:10px;color:#8a857c;text-transform:uppercase;letter-spacing:.08em}
.env-card .value{font-family:'Playfair Display',serif;font-size:28px;line-height:1.2}
.env-card .tag{font-size:10px;font-weight:600;margin-top:2px}
.forecast-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ece6}
.forecast-row:last-child{border-bottom:none}
.forecast-month{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#004D3D;width:36px}
.forecast-info{flex:1;font-size:12px;color:#4a4840}
.forecast-risk{font-size:11px;color:#dc2626;font-weight:500;margin-top:2px}
.advisory-box{background:linear-gradient(135deg,#004D3D,#006B54);border-radius:12px;padding:16px;color:#fff}
.advisory-box .label{font-size:12px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.advisory-box .text{font-size:13px;line-height:1.7;opacity:.95}

/* Products */
.product-card{background:#fff;border-radius:14px;padding:14px;border:1px solid #e8e4de;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.product-icon{width:48px;height:48px;border-radius:10px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-name{font-size:13px;font-weight:600;color:#2a2a28;line-height:1.3}
.product-reason{font-size:11px;color:#004D3D;margin-top:2px}
.product-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.product-price{font-size:14px;font-weight:700;color:#2a2a28}
.product-match{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.match-high{background:#dcfce7;color:#166534}
.match-mid{background:#fef3c7;color:#92400e}

/* Source badge */
.source-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#8a857c;background:#f0ece6;padding:2px 8px;border-radius:8px;margin-bottom:12px}
.source-badge .dot{width:6px;height:6px;border-radius:3px}
.source-live{background:#4ade80}
.source-demo{background:#fbbf24}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-label">Sevyn8 × The Body Shop</div>
    <div class="header-title">Know Your Skin</div>
  </div>
  <div id="screen-container"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_BASE = window.location.origin; // Same origin when served by Express
const G = '#004D3D', GL = '#E8F5E9', GD = '#C49B5C';

// ============================================================
// STATE
// ============================================================
let state = {
  step: 0,
  skinData: null,
  envData: null,
  products: null,
  advisory: null,
  imageBase64: null,
  userLocation: null,
  source: 'demo',
};

const STEPS = ['intro', 'capture', 'analyzing', 'results', 'environment', 'products'];

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const container = document.getElementById('screen-container');
  const step = STEPS[state.step];
  
  let html = '';
  if (step !== 'intro' && step !== 'analyzing') {
    html += '<div class="progress-dots">';
    for (let i = 0; i < STEPS.length; i++) {
      if (STEPS[i] === 'analyzing') continue;
      html += `<span class="${i <= state.step ? 'active' : ''}"></span>`;
    }
    html += '</div>';
  }
  
  switch(step) {
    case 'intro': html += renderIntro(); break;
    case 'capture': html += renderCapture(); break;
    case 'analyzing': html += renderAnalyzing(); break;
    case 'results': html += renderResults(); break;
    case 'environment': html += renderEnvironment(); break;
    case 'products': html += renderProducts(); break;
  }
  
  container.innerHTML = `<div class="screen active">${html}</div>`;
  
  // Post-render hooks
  if (step === 'capture') initCamera();
  if (step === 'analyzing') runAnalysis();
}

// ============================================================
// SCREENS
// ============================================================
function renderIntro() {
  return `
    <div style="text-align:center;padding-top:32px">
      <div style="font-size:11px;letter-spacing:.2em;color:${GD};font-weight:600;text-transform:uppercase;margin-bottom:16px">Sevyn8 × The Body Shop</div>
      <h1 style="font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:400;color:${G};line-height:1.3;margin:0 0 16px">Know your skin.</h1>
      <p style="font-size:14px;color:#6b6860;line-height:1.7;margin:0 0 32px;padding:0 12px">AI-powered skin analysis personalized to your city's weather and pollution. Get a tailored skincare routine with The Body Shop products.</p>
      <div style="display:flex;flex-direction:column;gap:10px;padding:0 20px;text-align:left">
        ${['Instant AI skin type analysis','3-month weather & pollution impact','Personalized Body Shop routine','VIP in-store recognition'].map(t =>
          `<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:#4a4840">
            <div style="width:20px;height:20px;border-radius:10px;background:${GL};display:flex;align-items:center;justify-content:center;font-size:10px;color:${G};font-weight:700;flex-shrink:0">✓</div>${t}
          </div>`
        ).join('')}
      </div>
      <div style="margin-top:36px">
        <button class="btn btn-primary" onclick="goStep(1)">Begin skin analysis →</button>
      </div>
    </div>
  `;
}

function renderCapture() {
  return `
    <div class="step-label">Step 1 of 4</div>
    <h2>Take a selfie</h2>
    <div class="camera-box" id="camera-box">
      <video id="camera-video" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div class="camera-overlay">
        <div class="camera-oval" id="camera-oval"></div>
        <div class="camera-status">
          <div class="dot" id="cam-dot" style="background:#4ade80"></div>
          <span id="cam-status" style="color:#4ade80">Initializing camera...</span>
        </div>
      </div>
    </div>
    <p class="camera-hint">Position your face within the oval. Ensure even lighting, no glasses or makeup.</p>
    <div class="btn-group">
      <button class="btn btn-outline" onclick="goStep(0)">← Back</button>
      <button class="btn btn-primary" id="capture-btn" onclick="captureImage()" disabled>Capture 📸</button>
    </div>
  `;
}

function renderAnalyzing() {
  return `
    <div style="text-align:center;padding-top:40px">
      <div class="analyze-spinner"><div class="ring"></div></div>
      <h2>Analyzing your skin</h2>
      <p style="font-size:13px;color:#8a857c;margin-bottom:32px" id="analyze-status">Sending image to AI engine...</p>
      <div style="max-width:260px;margin:0 auto">
        <div class="bar-track"><div class="bar-fill" id="analyze-bar" style="width:0%;background:${G}"></div></div>
        <div style="font-size:12px;color:#aaa;margin-top:8px" id="analyze-pct">0%</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:32px;padding:0 20px">
        <div class="analyze-step" id="as-1">○ Haut.AI skin analysis</div>
        <div class="analyze-step" id="as-2">○ Weather data</div>
        <div class="analyze-step" id="as-3">○ Air quality data</div>
        <div class="analyze-step" id="as-4">○ Product matching</div>
      </div>
    </div>
  `;
}

function renderResults() {
  const d = state.skinData;
  if (!d) return '<p>Loading...</p>';
  
  const sourceBadge = `<div class="source-badge"><div class="dot ${d.source === 'haut_ai' ? 'source-live' : 'source-demo'}"></div>${d.source === 'haut_ai' ? 'Live analysis' : 'Demo data'}</div>`;
  
  return `
    <div class="step-label">Step 2 of 4</div>
    <h2>Your skin profile</h2>
    ${sourceBadge}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
        <div>
          <div style="font-size:11px;color:#8a857c;text-transform:uppercase;letter-spacing:.1em">Skin type</div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;color:${G}">${d.skinType}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:#8a857c">Skin age</div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;color:${GD}">${d.perceivedAge}</div>
        </div>
      </div>
      <div class="metric-grid">
        <div>
          <div style="font-size:11px;color:#8a857c;margin-bottom:4px">Hydration</div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.hydration}%;background:#4a90d9"></div></div>
          <div style="font-size:12px;color:${d.hydration < 45 ? '#d97706' : '#16a34a'};margin-top:2px">${d.hydration}% — ${d.hydration < 35 ? 'Low' : d.hydration < 55 ? 'Below average' : 'Good'}</div>
        </div>
        <div>
          <div style="font-size:11px;color:#8a857c;margin-bottom:4px">Oiliness</div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.oiliness}%;background:#e8a040"></div></div>
          <div style="font-size:12px;color:${d.oiliness > 65 ? '#d97706' : '#16a34a'};margin-top:2px">${d.oiliness}% — ${d.oiliness > 70 ? 'High T-zone' : d.oiliness > 50 ? 'Moderate' : 'Normal'}</div>
        </div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:600;color:#4a4840;margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em">Top concerns detected</div>
    ${d.concerns.map(c => `
      <div class="concern-row">
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="severity">${c.severity}</div>
        </div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${c.score}%;background:${c.score > 50 ? '#e87040' : GD}"></div></div>
        </div>
      </div>
    `).join('')}
    <div class="btn-group">
      <button class="btn btn-outline" onclick="goStep(1)">← Retake</button>
      <button class="btn btn-primary" onclick="goStep(4)">See environment impact →</button>
    </div>
  `;
}

function renderEnvironment() {
  const e = state.envData;
  if (!e) return '<p>Loading environment data...</p>';
  
  const w = e.weather, p = e.pollution, f = e.forecast;
  const uvColor = w.uvIndex >= 8 ? '#dc2626' : w.uvIndex >= 5 ? '#d97706' : '#16a34a';
  const aqiColor = p.aqi > 150 ? '#dc2626' : p.aqi > 100 ? '#d97706' : '#16a34a';
  const humColor = w.humidity < 35 ? '#d97706' : w.humidity > 70 ? '#d97706' : '#16a34a';
  
  return `
    <div class="step-label">Step 3 of 4</div>
    <h2>Your environment</h2>
    <p style="font-size:13px;color:#8a857c;margin-bottom:16px">${p.city || 'Your location'} — Real-time + 3-month outlook</p>
    <div class="env-grid">
      <div class="env-card">
        <div class="label">UV Index</div>
        <div class="value" style="color:${uvColor}">${w.uvIndex}<span style="font-size:13px;color:#bbb">/ 11</span></div>
        <div class="tag" style="color:${uvColor}">${w.uvIndex >= 8 ? 'Very high' : w.uvIndex >= 5 ? 'Moderate' : 'Low'}</div>
      </div>
      <div class="env-card">
        <div class="label">AQI</div>
        <div class="value" style="color:${aqiColor}">${p.aqi}</div>
        <div class="tag" style="color:${aqiColor}">${p.aqi > 150 ? 'Unhealthy' : p.aqi > 100 ? 'Moderate' : 'Good'}</div>
      </div>
      <div class="env-card">
        <div class="label">Humidity</div>
        <div class="value" style="color:${humColor}">${w.humidity}<span style="font-size:13px;color:#bbb">%</span></div>
        <div class="tag" style="color:${humColor}">${w.humidity < 35 ? 'Low' : w.humidity > 70 ? 'High' : 'Normal'}</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:600;color:#4a4840;margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em">3-month skin forecast</div>
      ${(f || []).map(m => `
        <div class="forecast-row">
          <div class="forecast-month">${m.month}</div>
          <div style="flex:1">
            <div class="forecast-info">${m.temp} · UV ${m.uv} · AQI ${m.aqi}</div>
            <div class="forecast-risk">${m.risk}</div>
          </div>
        </div>
      `).join('')}
    </div>
    ${state.advisory ? `
      <div class="advisory-box">
        <div class="label">AI skin advisory</div>
        <div class="text">${state.advisory}</div>
      </div>
    ` : ''}
    <div class="btn-group">
      <button class="btn btn-outline" onclick="goStep(3)">← Back</button>
      <button class="btn btn-primary" onclick="goStep(5)">See your routine →</button>
    </div>
  `;
}

function renderProducts() {
  const prods = state.products;
  if (!prods || prods.length === 0) return '<p>Generating recommendations...</p>';
  
  const total = prods.reduce((s, p) => s + parseInt((p.price || '0').replace(/[^\d]/g, ''), 10), 0);
  
  return `
    <div class="step-label">Step 4 of 4</div>
    <h2>Your personalized routine</h2>
    <p style="font-size:13px;color:#8a857c;margin-bottom:16px">Matched to your skin + your city's conditions</p>
    ${prods.map(p => `
      <div class="product-card">
        <div class="product-icon">${p.img || '🧴'}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-reason">${p.reason}</div>
          <div class="product-meta">
            <span class="product-price">${p.price}</span>
            <span class="product-match ${p.match > 90 ? 'match-high' : 'match-mid'}">${p.match}% match</span>
          </div>
        </div>
      </div>
    `).join('')}
    <div class="card" style="background:#f8f6f1;border:none;text-align:center;margin-top:16px">
      <div style="font-size:12px;color:#8a857c;margin-bottom:4px">Routine total</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;color:${G}">₹${total.toLocaleString('en-IN')}</div>
    </div>
    <div class="card" style="background:${GL};border:none;display:flex;align-items:center;gap:10px">
      <div style="width:20px;height:20px;border-radius:10px;background:${G};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0">✓</div>
      <div style="font-size:12px;color:${G};line-height:1.5"><strong>Save your profile</strong> to track skin changes over time and get seasonal routine updates.</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline" onclick="goStep(4)">← Back</button>
      <button class="btn btn-primary" onclick="goStep(0)">Start over ↻</button>
    </div>
    <p style="font-size:11px;color:#aaa;text-align:center;margin-top:16px;line-height:1.5">Products recommended based on AI skin analysis by Haut.AI, weather data by Tomorrow.io, and air quality data by IQAir. Recommendation logic validated by a certified dermatologist.</p>
  `;
}

// ============================================================
// CAMERA
// ============================================================
let videoStream = null;

async function initCamera() {
  const video = document.getElementById('camera-video');
  const btn = document.getElementById('capture-btn');
  const dot = document.getElementById('cam-dot');
  const status = document.getElementById('cam-status');
  const oval = document.getElementById('camera-oval');
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 2560 }, height: { ideal: 2560 } }
    });
    videoStream = stream;
    video.srcObject = stream;
    
    // Wait for video to be ready
    video.onloadedmetadata = () => {
      btn.disabled = false;
      dot.style.background = '#4ade80';
      status.style.color = '#4ade80';
      status.textContent = 'Camera ready — tap capture';
      oval.classList.add('ready');
    };
  } catch (err) {
    dot.style.background = '#ef4444';
    status.style.color = '#ef4444';
    status.textContent = 'Camera denied — using demo mode';
    btn.disabled = false;
    btn.textContent = 'Use demo photo →';
  }
}

function captureImage() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  
  if (videoStream && video.videoWidth > 0) {
    // Capture at high resolution for Haut.AI (needs min 2500x2500, face 85%+)
    const size = Math.min(video.videoWidth, video.videoHeight, 2560);
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    // Center-crop to square
    const sx = (video.videoWidth - size) / 2;
    const sy = (video.videoHeight - size) / 2;
    ctx.translate(size, 0);
    ctx.scale(-1, 1); // Mirror
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
    
    state.imageBase64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];
    
    // Stop camera
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  } else {
    // No camera — will use demo data
    state.imageBase64 = null;
  }
  
  // Get location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => { state.userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
      () => { state.userLocation = { lat: 28.6139, lon: 77.2090 }; } // Default: Delhi
    );
  } else {
    state.userLocation = { lat: 28.6139, lon: 77.2090 };
  }
  
  goStep(2); // Go to analyzing
}

// ============================================================
// ANALYSIS PIPELINE
// ============================================================
async function runAnalysis() {
  const bar = document.getElementById('analyze-bar');
  const pct = document.getElementById('analyze-pct');
  const statusEl = document.getElementById('analyze-status');
  
  function setProgress(p, msg) {
    bar.style.width = p + '%';
    pct.textContent = Math.round(p) + '%';
    if (msg) statusEl.textContent = msg;
  }
  
  function markStep(n) {
    const el = document.getElementById('as-' + n);
    if (el) { el.classList.add('done'); el.textContent = '● ' + el.textContent.slice(2); }
  }
  
  try {
    // Step 1: Skin analysis
    setProgress(10, 'Sending image to AI engine...');
    
    let skinResult;
    if (state.imageBase64) {
      const skinRes = await fetch(API_BASE + '/api/analyze-skin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_base64: state.imageBase64 }),
      });
      skinResult = await skinRes.json();
    } else {
      // No image — fetch demo data
      const skinRes = await fetch(API_BASE + '/api/analyze-skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      skinResult = await skinRes.json();
    }
    
    state.skinData = skinResult;
    state.source = skinResult.source || 'demo';
    setProgress(40, 'Skin analysis complete');
    markStep(1);
    
    // Step 2: Environment
    setProgress(50, 'Fetching weather data...');
    const loc = state.userLocation || { lat: 28.6139, lon: 77.2090 };
    const envRes = await fetch(`${API_BASE}/api/environment?lat=${loc.lat}&lon=${loc.lon}`);
    const envResult = await envRes.json();
    state.envData = envResult;
    setProgress(65, 'Weather & pollution data received');
    markStep(2);
    markStep(3);
    
    // Step 3: Advisory
    setProgress(75, 'Generating skin advisory...');
    const advRes = await fetch(API_BASE + '/api/skin-advisory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        skinType: skinResult.skinType,
        concerns: skinResult.concerns,
        hydration: skinResult.hydration,
        weather: envResult.weather,
        pollution: envResult.pollution,
        forecast: envResult.forecast,
      }),
    });
    const advResult = await advRes.json();
    state.advisory = advResult.advisory;
    
    // Step 4: Product recommendations
    setProgress(85, 'Matching products...');
    const recRes = await fetch(API_BASE + '/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        skinType: skinResult.skinType,
        concerns: skinResult.concerns,
        hydration: skinResult.hydration,
        oiliness: skinResult.oiliness,
        weather: envResult.weather,
        pollution: envResult.pollution,
      }),
    });
    const recResult = await recRes.json();
    state.products = recResult.recommendations;
    setProgress(100, 'Your routine is ready!');
    markStep(4);
    
    // Auto-advance after brief pause
    setTimeout(() => goStep(3), 800);
    
  } catch (err) {
    console.error('Analysis pipeline error:', err);
    statusEl.textContent = 'Using demo data...';
    
    // Fallback: load demo data from server
    try {
      const skinRes = await fetch(API_BASE + '/api/analyze-skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      state.skinData = await skinRes.json();
      
      const envRes = await fetch(`${API_BASE}/api/environment?lat=28.6139&lon=77.2090`);
      state.envData = await envRes.json();
      
      const recRes = await fetch(API_BASE + '/api/recommend', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skinType: state.skinData.skinType, concerns: state.skinData.concerns, hydration: state.skinData.hydration, oiliness: state.skinData.oiliness, weather: state.envData.weather, pollution: state.envData.pollution }),
      });
      state.products = (await recRes.json()).recommendations;
      state.advisory = 'Your skin needs protection from Delhi\'s high UV and severe air pollution. Focus on barrier defense and SPF 50+ daily.';
    } catch (e2) {
      // Ultimate fallback: hardcoded
      state.skinData = { source: 'demo', skinType: 'Combination', perceivedAge: 28, hydration: 42, oiliness: 68, concerns: [{ name: 'Pigmentation', score: 62, severity: 'Moderate', tech: 'pigmentation' }, { name: 'Open pores', score: 48, severity: 'Moderate', tech: 'pores' }] };
      state.envData = { weather: { temperature: 34, humidity: 45, uvIndex: 9 }, pollution: { aqi: 186, pm25: 92, city: 'New Delhi' }, forecast: [{ month: 'Apr', temp: '38°C', humidity: '25%', uv: 10, aqi: 165, risk: 'UV damage + dehydration' }] };
      state.products = [{ name: 'Vitamin C Glow Serum', price: '₹1,995', reason: 'Targets pigmentation', img: '✨', match: 94 }];
    }
    
    setProgress(100, 'Ready');
    markStep(1); markStep(2); markStep(3); markStep(4);
    setTimeout(() => goStep(3), 800);
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function goStep(n) {
  // Stop camera if leaving capture screen
  if (STEPS[state.step] === 'capture' && videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
  state.step = Math.max(0, Math.min(n, STEPS.length - 1));
  render();
}

// ============================================================
// INIT
// ============================================================
render();
</script>
